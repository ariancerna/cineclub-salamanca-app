services:
  postgres:
    image: postgres:16-alpine
    container_name: cineclub-db
    environment:
      POSTGRES_DB: cineclub
      POSTGRES_USER: cineclub_user
      POSTGRES_PASSWORD: cineclub_pass
    ports:
      - "5432:5432"
    volumes:
      - cineclub_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  cineclub_data:
