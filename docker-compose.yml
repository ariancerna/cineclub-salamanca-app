# Desarrollo (solo base de datos):  docker compose up -d db
# Despliegue completo:              docker compose --profile completo up -d --build

services:
  db:
    image: postgres:15-alpine
    container_name: cineclub-db
    restart: always
    environment:
      TZ: ${TZ:-America/Lima}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cineclub-salamanca/backend:1.0.0
    container_name: cineclub-backend
    profiles: ["completo"]
    restart: always
    depends_on:
      db:
        # Espera a que la base acepte conexiones, no solo a que arranque
        condition: service_healthy
    environment:
      # Las funciones se guardan sin zona horaria: el contenedor debe usar la del cineclub
      TZ: ${TZ:-America/Lima}
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs

  frontend:
    image: nginx:1.27-alpine
    container_name: cineclub-frontend
    profiles: ["completo"]
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
