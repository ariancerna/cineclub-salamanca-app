services:
  postgres:
    image: postgres:16-alpine
    container_name: cineclub-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - cineclub_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  cineclub_data:
