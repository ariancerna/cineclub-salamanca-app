<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineclub Salamanca - Mis Entradas</title>
    <!-- Tailwind Play CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @import "tailwindcss";
        @theme { --color-brand-primary: #b7102a; --color-brand-surface: #ffffff; --color-brand-ink: #271717; --color-brand-outline: #8f6f6e; }
        @utility btn-primary { @apply bg-brand-primary text-white font-bold uppercase tracking-widest px-8 py-4 transition-all hover:bg-brand-ink; }
        @utility shadow-hard { @apply shadow-[4px_4px_0px_0px_rgba(39,23,23,1)]; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="fade-in">
    <nav class="sticky top-0 z-40 bg-white border-b border-brand-outline px-6 h-20 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-bold tracking-tighter hover:text-brand-primary">CINECLUB SALAMANCA</a>
        <div class="flex gap-8 font-bold text-xs uppercase tracking-widest">
            <a href="mis-entradas.html" class="text-brand-primary">Mis Entradas</a>
            <a href="admin.html" class="hover:text-brand-primary">Admin</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 md:py-20">
        <h1 class="text-4xl md:text-6xl font-bold uppercase mb-8 md:mb-12 tracking-tighter text-center md:text-left">Tu Historial</h1>
        
        <div class="flex justify-center md:justify-start gap-8 border-b border-brand-outline mb-12">
            <button class="border-b-2 border-brand-ink pb-4 font-bold uppercase text-xs">Próximas</button>
            <button class="pb-4 font-bold uppercase text-xs text-brand-outline">Archivadas</button>
        </div>

        <div id="tickets-container" class="space-y-8">
            <!-- Ticket Activo -->
            <div class="border border-brand-ink p-10 bg-white grid grid-cols-1 md:grid-cols-12 gap-12 items-center hover:translate-x-1 transition-transform cursor-pointer" onclick="window.location.href='ticket.html'">
                <div class="md:col-span-2 aspect-[3/4] bg-gray-100 overflow-hidden border border-brand-outline">
                    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDH-lDuWnXEPgVdQ_t87SvmMaZRKfXlPxFvG4MHvNtYUiGr9RT5JZ-sUnyUgJhKJxsc17nL5cWgXeJwgEtN7mdoK3B63AzRQD0nFB9ITohTkvFFV8fN_Fh8Vd3mPpoxIzGx7FJc-JtwpcnAAfnctn0WmRBuvK7fK_gKff7ZLV_lCDegtkJARcGfL5dPKf3TygEpGOjk-DY7iPzMIAblvjk6RT-ikrs_U6BlYk8K_SszkDHH39vOawn5Y5YVNvJfIdBHBeJjWN7G9wji" class="w-full h-full object-cover grayscale">
                </div>
                <div class="md:col-span-10">
                    <span class="inline-block px-3 py-1 bg-brand-surface border border-brand-outline text-brand-primary text-[10px] font-bold uppercase mb-6 tracking-widest">Entrada Confirmada</span>
                    <h3 class="text-4xl font-bold uppercase mb-2">METROPOLIS</h3>
                    <p class="text-brand-outline font-bold">Dir. Fritz Lang, 1927</p>
                    
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-8 mt-12 bg-brand-surface p-6 border border-dashed border-brand-outline">
                        <div>
                            <span class="block text-[8px] font-bold text-brand-outline uppercase mb-1">Fecha</span>
                            <span class="text-sm font-bold">24 Nov, 19:30</span>
                        </div>
                        <div>
                            <span class="block text-[8px] font-bold text-brand-outline uppercase mb-1">Sala</span>
                            <span class="text-sm font-bold">Sala 01</span>
                        </div>
                        <div>
                            <span class="block text-[8px] font-bold text-brand-outline uppercase mb-1">Ubicación</span>
                            <span class="text-sm font-bold uppercase">Asiento G-14</span>
                        </div>
                        <div class="flex items-center gap-2 text-brand-primary font-bold">
                            <i data-lucide="ticket" class="w-5 h-5"></i>
                            <span class="text-[10px] uppercase">Ver Ticket Digital</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Ticket Pasado -->
            <div class="border border-brand-outline p-6 bg-gray-50 opacity-40 grayscale flex gap-8 items-center">
                <div class="w-16 h-20 bg-gray-200"></div>
                <div>
                  <h4 class="font-bold text-lg">EL GABINETE DEL DR. CALIGARI</h4>
                  <p class="text-[10px] uppercase font-bold text-brand-outline">12 Oct 2024 • Finalizada</p>
                </div>
                <div class="ml-auto">
                    <i data-lucide="archive" class="w-6 h-6 text-brand-outline"></i>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/src/mis-entradas.js"></script>
</body>
</html>
