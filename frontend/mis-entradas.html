<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineclub Salamanca - Mis Entradas</title>
    <!-- CDN de Tailwind Play -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme { --color-brand-primary: #b7102a; --color-brand-surface: #ffffff; --color-brand-ink: #271717; --color-brand-outline: #8f6f6e; }
        @utility btn-primary { @apply bg-brand-primary text-white font-bold uppercase tracking-widest px-8 py-4 transition-all hover:bg-brand-ink; }
        @utility shadow-hard { @apply shadow-[4px_4px_0px_0px_rgba(39,23,23,1)]; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="fade-in">
    <nav class="sticky top-0 z-40 bg-white border-b border-brand-outline px-6 h-20 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-bold tracking-tighter hover:text-brand-primary">CINECLUB SALAMANCA</a>
        <div class="flex gap-8 font-bold text-xs uppercase tracking-widest items-center">
            <a href="mis-entradas.html" class="text-brand-primary">Mis Entradas</a>
            <a id="nav-auth" href="#" class="hover:text-brand-primary">Acceder</a>
            <a href="admin.html" class="hover:text-brand-primary">Admin</a>
            <span id="nav-user" class="text-brand-outline hidden"></span>
            <button id="btn-logout" onclick="window.doLogout()" class="hidden hover:text-brand-primary">Salir</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 md:py-20">
        <h1 class="text-4xl md:text-6xl font-bold uppercase mb-8 md:mb-12 tracking-tighter text-center md:text-left">Tu Historial</h1>
        
        <div class="flex justify-center md:justify-start gap-8 border-b border-brand-outline mb-12">
            <button class="border-b-2 border-brand-ink pb-4 font-bold uppercase text-xs">Próximas</button>
            <button class="pb-4 font-bold uppercase text-xs text-brand-outline">Archivadas</button>
        </div>

        <div id="tickets-container" class="space-y-8">
            <div class="p-16 text-center">
                <div class="w-6 h-6 border-2 border-brand-primary border-t-transparent rounded-full mx-auto mb-4" style="animation: spin 0.8s linear infinite;"></div>
                <p class="text-brand-outline font-bold text-xs uppercase tracking-widest">Cargando tus entradas...</p>
            </div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Modal de autenticación compartido -->
    <div id="modal-auth" class="fixed inset-0 z-50 hidden items-center justify-center p-6 h-screen">
        <div class="absolute inset-0 bg-brand-ink/90 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-md border border-brand-ink shadow-hard">
            <button id="modal-auth-close" class="absolute top-3 right-3 text-brand-outline font-bold">✕</button>
            <div class="p-8 border-b border-brand-ink text-center">
                <h2 class="text-3xl font-bold uppercase">Acceder</h2>
                <p class="text-brand-outline text-xs mt-2">Necesitas una cuenta para reservar</p>
            </div>
            <div class="flex border-b border-brand-ink">
                <button id="tab-login" onclick="window.switchTab('login')"
                    class="flex-1 py-3 text-xs font-bold uppercase tracking-widest bg-brand-ink text-white">
                    Iniciar Sesión
                </button>
                <button id="tab-registro" onclick="window.switchTab('registro')"
                    class="flex-1 py-3 text-xs font-bold uppercase tracking-widest hover:bg-gray-50">
                    Registrarse
                </button>
            </div>
            <div class="p-8 space-y-4">
                <div id="auth-error" class="hidden text-xs text-brand-primary font-bold bg-red-50 border border-brand-primary p-3"></div>

                <div id="campo-nombre" class="hidden">
                    <label class="block text-[10px] font-bold text-brand-outline uppercase mb-1">Nombre</label>
                    <input id="auth-nombre" type="text" placeholder="Tu nombre completo"
                        class="w-full border-b border-brand-outline py-2 focus:outline-none focus:border-brand-primary font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-brand-outline uppercase mb-1">Email</label>
                    <input id="auth-email" type="email" placeholder="tu@email.com"
                        class="w-full border-b border-brand-outline py-2 focus:outline-none focus:border-brand-primary font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-brand-outline uppercase mb-1">Contraseña</label>
                    <input id="auth-password" type="password" placeholder="Mínimo 8 caracteres"
                        class="w-full border-b border-brand-outline py-2 focus:outline-none focus:border-brand-primary font-bold">
                </div>
                <button id="btn-auth-submit" onclick="window.submitAuth()"
                    class="w-full btn-primary shadow-hard shadow-hard-active mt-4">
                    Continuar
                </button>
            </div>
        </div>
    </div>
    <script type="module" src="src/js/pages/mis-entradas.js"></script>
</body>
</html>
