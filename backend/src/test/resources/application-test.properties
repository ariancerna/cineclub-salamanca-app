# ======================================
#  Perfil TEST — H2 en memoria
# ======================================
# Sin Docker ni PostgreSQL: cada ejecucion arranca con una base limpia.

spring.datasource.url=jdbc:h2:mem:cineclub_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwt.secret=clave_de_pruebas_con_mas_de_256_bits_para_firmar_jwt_hs256
app.jwt.expiration-ms=3600000

# "-" desactiva la tarea programada
app.mantenimiento.cron.reporte-diario=-
app.mantenimiento.cron.auditoria-aforo=-
app.mantenimiento.cron.purga-reservas=-

logging.file.name=
logging.level.com.cineclubsalamanca=WARN
logging.level.root=WARN
