# ======================================
#  Perfil TEST — H2 en memoria
# ======================================
# Las pruebas de integracion no dependen de Docker ni de PostgreSQL: cada
# ejecucion arranca con una base limpia y desechable.

spring.datasource.url=jdbc:h2:mem:cineclub_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Secreto fijo y conocido para poder firmar y validar tokens en las pruebas
app.jwt.secret=clave_de_pruebas_con_mas_de_256_bits_para_firmar_jwt_hs256
app.jwt.expiration-ms=3600000

# Las tareas programadas no deben dispararse durante las pruebas
app.mantenimiento.cron.reporte-diario=-
app.mantenimiento.cron.auditoria-aforo=-
app.mantenimiento.cron.purga-reservas=-

# Sin archivo de log durante las pruebas
logging.file.name=
logging.level.com.cineclubsalamanca=WARN
logging.level.root=WARN
