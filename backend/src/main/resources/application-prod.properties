# ======================================
#  Perfil PROD — PostgreSQL en servidor
# ======================================
# Las credenciales llegan por variables de entorno, sin valores por defecto.

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:db}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# validate: Hibernate comprueba el esquema pero no lo modifica
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# open-in-view se deja activo (el valor por defecto). Los DTO se construyen en la capa
# de servicio y recorren relaciones LAZY (Reserva -> usuario, funcion -> pelicula,
# detallesMinibar), asi que apagarlo lanza LazyInitializationException. Para desactivarlo
# haria falta @EntityGraph en las consultas de FuncionRepository y ReservaRepository.

# ---- Registros ----
logging.level.root=WARN
logging.level.com.cineclubsalamanca=${LOG_LEVEL:INFO}

# ---- Seguridad ----
spring.h2.console.enabled=false
server.error.include-stacktrace=never
server.error.include-message=never
server.shutdown=graceful

# ---- Monitoreo ----
management.endpoint.health.show-details=when-authorized
management.endpoints.web.exposure.include=health,info,metrics,prometheus
