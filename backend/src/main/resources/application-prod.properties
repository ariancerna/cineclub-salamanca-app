# ======================================
#  Perfil PROD — PostgreSQL en servidor
# ======================================
# Todas las credenciales llegan por variables de entorno: ningun secreto
# se escribe en este archivo, que si esta versionado en git.

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:db}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# Pool de conexiones dimensionado para el trafico de la sala
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# 'validate' evita que Hibernate altere el esquema en produccion:
# solo comprueba que las entidades concuerden con las tablas existentes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- Registros ----
logging.level.root=WARN
logging.level.com.cineclubsalamanca=${LOG_LEVEL:INFO}

# ---- Seguridad ----
# La consola H2 no debe existir en produccion
spring.h2.console.enabled=false
# No revelar la version del servidor ni trazas de error al cliente
server.error.include-stacktrace=never
server.error.include-message=never
server.shutdown=graceful

# ---- Monitoreo ----
# En produccion los detalles de salud requieren autenticacion de administrador
management.endpoint.health.show-details=when-authorized
management.endpoints.web.exposure.include=health,info,metrics,prometheus
