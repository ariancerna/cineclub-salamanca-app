# ======================================
#  Configuración del backend de CineClub Salamanca
# ======================================

# Servidor
server.port=${SERVER_PORT:8080}

spring.profiles.active=dev

# ---- JWT ----
# Cambia este secret por una cadena de al menos 32 caracteres en produccion
app.jwt.secret=${JWT_SECRET:change_me_in_production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Mantenimiento ----
# Meses que se conservan las reservas de funciones pasadas
app.mantenimiento.retencion-meses=${RETENCION_MESES:12}
app.mantenimiento.cron.reporte-diario=0 0 23 * * *
app.mantenimiento.cron.auditoria-aforo=0 30 3 * * MON
app.mantenimiento.cron.purga-reservas=0 0 4 1 * *

# ---- Registros ----
logging.level.com.cineclubsalamanca=${LOG_LEVEL:DEBUG}

# Rotacion: 10MB por archivo, 30 dias, 200MB en total
logging.file.name=${LOG_PATH:./logs}/cineclub.log
logging.logback.rollingpolicy.file-name-pattern=${LOG_PATH:./logs}/cineclub-%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=200MB
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ---- Monitoreo (Actuator) ----
# Solo los endpoints necesarios; el resto queda cerrado
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ROLE_ADMIN
management.endpoint.health.probes.enabled=true

management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
info.app.nombre=CineClub Salamanca
info.app.descripcion=Sistema de reservas y control de aforo
info.app.version=@project.version@

# Percentiles de latencia (el promedio esconde los casos lentos)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.tags.application=cineclub-salamanca
