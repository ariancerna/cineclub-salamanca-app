# ======================================
#  Configuración del backend de CineClub Salamanca
# ======================================

# Servidor
server.port=${SERVER_PORT:8080}

spring.profiles.active=dev

# ---- JWT ----
# Cambia este secret por una cadena de al menos 32 caracteres en produccion
app.jwt.secret=${JWT_SECRET:change_me_in_production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Registros ----
logging.level.com.cineclubsalamanca=DEBUG
