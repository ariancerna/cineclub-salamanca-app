<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineclub Salamanca - Tu Entrada</title>
    <!-- Tailwind Play CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @import "tailwindcss";
        @theme { --color-brand-primary: #b7102a; --color-brand-surface: #ffffff; --color-brand-ink: #271717; --color-brand-outline: #8f6f6e; --font-display: "Space Grotesk", sans-serif; }
        @utility btn-primary { @apply bg-brand-primary text-white font-bold uppercase tracking-widest px-8 py-4 transition-all hover:bg-brand-ink; }
        @utility btn-outline { @apply border-2 border-brand-ink text-brand-ink font-bold uppercase tracking-widest px-8 py-4 transition-all hover:bg-brand-ink hover:text-white; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 fade-in flex flex-col min-h-screen">
    <nav class="bg-white border-b border-brand-outline px-6 h-20 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-bold tracking-tighter">CINECLUB SALAMANCA</a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-xl w-full bg-white border-2 border-brand-ink shadow-[12px_12px_0px_0px_rgba(39,23,23,1)] overflow-hidden">
            <!-- Cabecera del Ticket -->
            <div class="p-10 border-b border-brand-ink text-center bg-brand-surface">
                <span class="block text-[10px] font-bold text-brand-primary tracking-[0.5em] mb-2 uppercase">Entrada Digital</span>
                <span class="text-[8px] font-bold text-brand-outline italic">Presentar en puerta para validación</span>
            </div>

            <!-- Cuerpo del Ticket -->
            <div class="p-12 space-y-10">
                <div>
                    <span class="block text-[8px] font-bold text-brand-outline uppercase mb-2">Película</span>
                    <h2 id="ticket-title" class="text-4xl font-bold uppercase leading-tight tracking-tighter">PELÍCULA</h2>
                    <p id="ticket-info" class="text-xs font-bold text-brand-outline">Detalles de la función</p>
                </div>

                <div class="grid grid-cols-2 gap-10">
                    <div>
                        <span class="block text-[8px] font-bold text-brand-outline uppercase mb-2">Espectador</span>
                        <span id="ticket-user" class="text-xs font-bold uppercase tracking-wider">Juan Pérez García</span>
                    </div>
                    <div>
                        <span class="block text-[8px] font-bold text-brand-outline uppercase mb-2">Sesión</span>
                        <span class="text-xs font-bold">Sábado 24 Nov, 19:30</span>
                    </div>
                </div>

                <!-- Ubicación Física -->
                <div class="flex justify-between border-y border-dashed border-brand-ink py-8 bg-brand-surface/50">
                    <div class="text-center flex-1">
                        <span class="block text-[8px] font-bold text-brand-outline uppercase mb-1">Sala</span>
                        <span class="text-3xl font-display font-bold">01</span>
                    </div>
                    <div class="w-px bg-brand-outline/20"></div>
                    <div class="text-center flex-1">
                        <span class="block text-[8px] font-bold text-brand-outline uppercase mb-1">Fila</span>
                        <span id="ticket-fila" class="text-3xl font-display font-bold">G</span>
                    </div>
                    <div class="w-px bg-brand-outline/20"></div>
                    <div class="text-center flex-1">
                        <span class="block text-[8px] font-bold text-brand-outline uppercase mb-1">Butaca</span>
                        <span id="ticket-butaca" class="text-3xl font-display font-bold">14</span>
                    </div>
                </div>

                <!-- Snacks -->
                <div class="bg-gray-50 border border-brand-outline p-6">
                    <span class="inline-flex items-center gap-2 text-[8px] font-bold uppercase text-brand-primary mb-2">
                        <i data-lucide="coffee" class="w-3 h-3"></i> Servicios adicionales
                    </span>
                    <ul id="ticket-snacks" class="text-[10px] space-y-1 mb-4">
                        <!-- Generado por JS -->
                    </ul>
                    <div class="pt-4 border-t border-brand-outline flex justify-between items-center">
                        <span class="text-[8px] font-bold uppercase text-brand-outline">Monto a pagar en boletería</span>
                        <span id="ticket-total" class="text-xl font-bold text-brand-primary">S/ 0.00</span>
                    </div>
                </div>

                <!-- Pie del Ticket (Sin QR por petición) -->
                <div class="flex justify-between items-center pt-8 border-t border-brand-ink font-mono text-[8px] text-brand-outline">
                    <span id="ticket-ref">REF ID: CSA-29004-B</span>
                    <span class="text-brand-primary font-bold">PRE-ORDEN COMPLETA</span>
                </div>
            </div>
        </div>
    </main>

    <div class="max-w-xl mx-auto w-full px-6 pb-20 text-center">
        <button onclick="window.print()" class="btn-outline w-full mb-4 md:w-auto">Guardar PDF</button>
        <button onclick="window.location.href='index.html'" class="btn-primary w-full md:w-auto">Volver al Inicio</button>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/src/detalle-ticket.js"></script>
</body>
</html>
